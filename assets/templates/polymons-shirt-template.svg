<svg xmlns="http://www.w3.org/2000/svg" width="585" height="559" viewBox="0 0 585 559">
  <title>Polymons classic block shirt template</title>
  <desc>585 by 559 shirt artwork guide for the Polymons block avatar torso and arms.</desc>
  <defs>
    <style>
      .label { fill: #fff; font: 700 25px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .small { fill: #fff; font: 700 15px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .section { fill: #252330; font: 700 28px Arial, sans-serif; letter-spacing: 1px; }
      .note { fill: #605d6b; font: 14px Arial, sans-serif; }
      .seam { fill: none; stroke: rgba(255,255,255,.78); stroke-width: 1; stroke-dasharray: 5 4; }
      .edge { fill: none; stroke: #252330; stroke-width: 2; }
    </style>
  </defs>

  <rect width="585" height="559" fill="#f3f1f6"/>

  <g id="torso">
    <rect x="231" y="8" width="128" height="64" fill="#168ed6"/>
    <rect x="165" y="74" width="64" height="128" fill="#16a96b"/>
    <rect x="231" y="74" width="128" height="128" fill="#e52e38"/>
    <rect x="361" y="74" width="64" height="128" fill="#f3a814"/>
    <rect x="427" y="74" width="128" height="128" fill="#157db8"/>
    <rect x="231" y="204" width="128" height="64" fill="#ef7f16"/>

    <rect class="edge" x="231" y="8" width="128" height="64"/>
    <rect class="edge" x="165" y="74" width="64" height="128"/>
    <rect class="edge" x="231" y="74" width="128" height="128"/>
    <rect class="edge" x="361" y="74" width="64" height="128"/>
    <rect class="edge" x="427" y="74" width="128" height="128"/>
    <rect class="edge" x="231" y="204" width="128" height="64"/>

    <text class="label" x="295" y="40">UP</text>
    <text class="label" x="197" y="138">R</text>
    <text class="label" x="295" y="138">FRONT</text>
    <text class="label" x="393" y="138">L</text>
    <text class="label" x="491" y="138">BACK</text>
    <text class="label" x="295" y="236">DOWN</text>
    <text class="section" x="384" y="48">TORSO</text>
  </g>

  <g id="right-arm">
    <rect x="217" y="289" width="64" height="64" fill="#168ed6"/>
    <rect x="18" y="355" width="64" height="128" fill="#f3a814"/>
    <rect x="84" y="355" width="64" height="128" fill="#157db8"/>
    <rect x="150" y="355" width="64" height="128" fill="#16a96b"/>
    <rect x="217" y="355" width="64" height="128" fill="#e52e38"/>
    <rect x="217" y="485" width="64" height="64" fill="#ef7f16"/>

    <rect class="edge" x="217" y="289" width="64" height="64"/>
    <rect class="edge" x="18" y="355" width="64" height="128"/>
    <rect class="edge" x="84" y="355" width="64" height="128"/>
    <rect class="edge" x="150" y="355" width="64" height="128"/>
    <rect class="edge" x="217" y="355" width="64" height="128"/>
    <rect class="edge" x="217" y="485" width="64" height="64"/>

    <path class="seam" d="M18 419h263"/>
    <text class="small" x="249" y="321">UP</text>
    <text class="label" x="50" y="419">L</text>
    <text class="label" x="116" y="419">B</text>
    <text class="label" x="182" y="419">R</text>
    <text class="label" x="249" y="419">F</text>
    <text class="small" x="249" y="517">DOWN</text>
    <text class="section" x="18" y="529">RIGHT ARM</text>
  </g>

  <g id="left-arm">
    <rect x="308" y="289" width="64" height="64" fill="#168ed6"/>
    <rect x="308" y="355" width="64" height="128" fill="#e52e38"/>
    <rect x="374" y="355" width="64" height="128" fill="#f3a814"/>
    <rect x="440" y="355" width="64" height="128" fill="#157db8"/>
    <rect x="506" y="355" width="64" height="128" fill="#16a96b"/>
    <rect x="308" y="485" width="64" height="64" fill="#ef7f16"/>

    <rect class="edge" x="308" y="289" width="64" height="64"/>
    <rect class="edge" x="308" y="355" width="64" height="128"/>
    <rect class="edge" x="374" y="355" width="64" height="128"/>
    <rect class="edge" x="440" y="355" width="64" height="128"/>
    <rect class="edge" x="506" y="355" width="64" height="128"/>
    <rect class="edge" x="308" y="485" width="64" height="64"/>

    <path class="seam" d="M308 419h262"/>
    <text class="small" x="340" y="321">UP</text>
    <text class="label" x="340" y="419">F</text>
    <text class="label" x="406" y="419">L</text>
    <text class="label" x="472" y="419">B</text>
    <text class="label" x="538" y="419">R</text>
    <text class="small" x="340" y="517">DOWN</text>
    <text class="section" x="390" y="529">LEFT ARM</text>
  </g>

  <g id="instructions">
    <text class="section" x="18" y="34">POLYMONS</text>
    <text class="note" x="18" y="55">CLASSIC SHIRT TEMPLATE</text>
    <text class="note" x="18" y="92">585 × 559 PX</text>
    <text class="note" x="18" y="111">Paint every face.</text>
    <text class="note" x="18" y="130">Keep art off edges.</text>
    <text class="note" x="377" y="226">F = front · B = back</text>
    <text class="note" x="377" y="244">L/R = side faces</text>
    <text class="note" x="377" y="262">Dashed line = arm middle</text>
  </g>
</svg>
