name: Package Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "patch-*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  POLYMONS_RELEASE_TAG: ${{ github.ref_name }}

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            playerScript: player:package:win
            studioScript: studio:package:win
            adminScript: admin:package:win
          - platform: mac
            os: macos-latest
            playerScript: player:package:mac
            studioScript: studio:package:mac
            adminScript: admin:package:mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Player
        run: npm run ${{ matrix.playerScript }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package Studio
        run: npm run ${{ matrix.studioScript }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package Admin
        run: npm run ${{ matrix.adminScript }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Validate macOS apps and installers
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail

          for arch in x64 arm64; do
            test -f "release/PolymonsPlayer-mac-${arch}.dmg"
            test -f "release/PolymonsPlayer-mac-${arch}.zip"
            test -f "studio-release/PolyStudio-mac-${arch}.dmg"
            test -f "studio-release/PolyStudio-mac-${arch}.zip"
            test -f "admin-release/PolyAdmin-mac-${arch}.dmg"
            test -f "admin-release/PolyAdmin-mac-${arch}.zip"
          done

          for archive in release/*.zip studio-release/*.zip admin-release/*.zip; do
            unzip -t "$archive" >/dev/null
          done
          for image in release/*.dmg studio-release/*.dmg admin-release/*.dmg; do
            hdiutil imageinfo "$image" >/dev/null
          done

          player_x64="$(find release/mac -maxdepth 1 -name '*.app' -print -quit)"
          player_arm64="$(find release/mac-arm64 -maxdepth 1 -name '*.app' -print -quit)"
          studio_x64="$(find studio-release/mac -maxdepth 1 -name '*.app' -print -quit)"
          studio_arm64="$(find studio-release/mac-arm64 -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$player_x64" && test -n "$player_arm64"
          test -n "$studio_x64" && test -n "$studio_arm64"

          plutil -lint "$player_x64/Contents/Info.plist"
          plutil -lint "$player_arm64/Contents/Info.plist"
          plutil -lint "$studio_x64/Contents/Info.plist"
          plutil -lint "$studio_arm64/Contents/Info.plist"
          plutil -p "$player_x64/Contents/Info.plist" | grep -q 'polymons'
          lipo -archs "$player_x64/Contents/MacOS/Polymons Player" | grep -qw x86_64
          lipo -archs "$player_arm64/Contents/MacOS/Polymons Player" | grep -qw arm64
          lipo -archs "$studio_x64/Contents/MacOS/Poly Studio" | grep -qw x86_64
          lipo -archs "$studio_arm64/Contents/MacOS/Poly Studio" | grep -qw arm64

          if codesign -dv "$player_x64" >/dev/null 2>&1; then
            codesign --verify --deep --strict "$player_x64"
            codesign --verify --deep --strict "$player_arm64"
            codesign --verify --deep --strict "$studio_x64"
            codesign --verify --deep --strict "$studio_arm64"
          fi

      - name: Upload Player artifacts
        uses: actions/upload-artifact@v4
        with:
          name: player-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Upload Studio artifacts
        uses: actions/upload-artifact@v4
        with:
          name: studio-${{ matrix.platform }}
          path: |
            studio-release/*.exe
            studio-release/*.dmg
            studio-release/*.zip
          if-no-files-found: error

      - name: Upload Admin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-${{ matrix.platform }}
          path: |
            admin-release/*.exe
            admin-release/*.dmg
            admin-release/*.zip
          if-no-files-found: error

  package-android:
    name: Package Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build Player APK
        run: npm run mobile:apk:debug

      - name: Build Studio APK
        run: npm run studio:mobile:apk:debug

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            release/Polymons-Player.apk
            studio-release/Poly-Studio.apk
          if-no-files-found: error

  release:
    name: Attach Public Apps To Release
    runs-on: ubuntu-latest
    needs:
      - package
      - package-android
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-artifacts/player-*/*
            desktop-artifacts/studio-*/*
            desktop-artifacts/android-apks/**/*
